name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Resolve citylens-core ref
        id: core-ref
        shell: bash
        env:
          OVERRIDE_REF: ${{ vars.CITYLENS_CORE_REF }}
        run: |
          set -euo pipefail

          ref="v0.3.25"
          if [ -n "${OVERRIDE_REF}" ]; then
            ref="${OVERRIDE_REF}"
          fi

          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Sync environment
        run: uv sync --all-packages --all-extras --frozen

      - name: Install citylens-core
        env:
          CITYLENS_CORE_REF: ${{ steps.core-ref.outputs.ref }}
        run: uv pip install --python ./.venv/bin/python --no-cache-dir "citylens-core[sam2] @ git+https://github.com/joshvern/citylens-core.git@${CITYLENS_CORE_REF}"

      - name: Lint API
        run: ./.venv/bin/python -m ruff check api/app api/tests

      - name: Lint worker
        run: ./.venv/bin/python -m ruff check worker/services worker/worker.py worker/test_*.py

      - name: Test API
        run: ./.venv/bin/python -m pytest api/tests

      - name: Test worker
        run: ./.venv/bin/python -m pytest worker
